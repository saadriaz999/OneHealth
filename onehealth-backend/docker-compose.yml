# Postgres in Docker; FastAPI stays on the EC2 host and connects via 127.0.0.1:5432.
#
# Amazon Linux 2023: default `docker` often has no Compose plugin. If `docker compose version`
# fails, install the CLI plugin (as ec2-user), then ensure the daemon is running:
#   mkdir -p ~/.docker/cli-plugins
#   curl -fsSL https://github.com/docker/compose/releases/download/v2.32.4/docker-compose-linux-x86_64 \
#     -o ~/.docker/cli-plugins/docker-compose && chmod +x ~/.docker/cli-plugins/docker-compose
#   sudo systemctl enable --now docker
#   sudo usermod -aG docker ec2-user   # then log out and back in to run docker without sudo
#
# Setup:
#   1. In .env, set POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB (or rely on defaults below).
#   2. Set DATABASE_URL to match, e.g.:
#        postgresql://onehealth:YOUR_PASSWORD@127.0.0.1:5432/onehealth_db
#   3. From this directory:  docker compose up -d
#   4. Wait until healthy:    docker compose ps
#   5. On the host:           python3 -m uvicorn main:app --host 0.0.0.0 --port 8000
#
# Port 5432 is bound to 127.0.0.1 only so Postgres is not reachable from the public internet.

services:
  db:
    image: postgres:16-alpine
    container_name: onehealth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-onehealth}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-onehealth_db}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
